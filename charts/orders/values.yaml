replicaCount: 2
image:
  repository: retail/orders-api
  tag: v1.0.0
service:
  type: ClusterIP
  port: 8080

egress:
  allow:
    - name: payments
      host: payments-api.prod.company.internal
      port: 443
      protocol: HTTPS
      justification: Submit payment authorization requests
      ticket: CHG123456
      ttlDays: 30
    - name: inventory
      host: inventory-api.prod.company.internal
      port: 443
      protocol: HTTPS
      justification: Look up stock levels for order fulfillment
      ticket: CHG200001
      ttlDays: 30
    - name: notifications
      host: notifications-api.prod.company.internal
      port: 443
      protocol: HTTPS
      justification: Send order confirmation messages to customers
      ticket: CHG200002
      ttlDays: 14
    - name: analytics
      host: analytics-api.prod.company.internal
      port: 443
      protocol: HTTPS
      justification: Stream order events to analytics ingest
      ticket: CHG200003
      ttlDays: 60
